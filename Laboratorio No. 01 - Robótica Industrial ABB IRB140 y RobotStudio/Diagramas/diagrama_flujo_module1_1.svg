<svg width="100%" viewBox="0 0 680 1420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Fondo blanco -->
  <rect width="680" height="1420" fill="white"/>

  <!-- START -->
  <rect x="240" y="20" width="200" height="44" rx="22" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" x="340" y="42" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Inicio — main()</text>

  <line x1="340" y1="64" x2="340" y2="98" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- WHILE TRUE -->
  <rect x="210" y="98" width="260" height="44" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" x="340" y="120" text-anchor="middle" dominant-baseline="central" fill="#26215C">WHILE TRUE DO</text>

  <line x1="340" y1="142" x2="340" y2="176" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Reset señales -->
  <rect x="190" y="176" width="300" height="56" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" x="340" y="196" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Reset señales</text>
  <text font-family="Arial" font-size="12" x="340" y="216" text-anchor="middle" dominant-baseline="central" fill="#444441">DO_01, DO_02, FWD/BWD_Conveyor</text>

  <line x1="340" y1="232" x2="340" y2="266" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decision DI_01 -->
  <rect x="190" y="266" width="300" height="44" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" x="340" y="288" text-anchor="middle" dominant-baseline="central" fill="#412402">¿DI_01 = 1?</text>

  <line x1="490" y1="288" x2="580" y2="288" stroke="#5F5E5A" stroke-width="1"/>
  <text font-family="Arial" font-size="12" x="530" y="282" text-anchor="middle" fill="#444441">NO</text>

  <line x1="340" y1="310" x2="340" y2="344" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="Arial" font-size="12" x="352" y="332" fill="#444441">SÍ</text>

  <!-- Set DO_01 -->
  <rect x="185" y="344" width="310" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" x="340" y="364" text-anchor="middle" dominant-baseline="central" fill="#04342C">Set DO_01</text>
  <text font-family="Arial" font-size="12" x="340" y="384" text-anchor="middle" dominant-baseline="central" fill="#085041">Set BWD_Conveyor + FWD_Conveyor</text>

  <line x1="340" y1="400" x2="340" y2="430" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- WaitTime 5 -->
  <rect x="185" y="430" width="310" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" x="340" y="452" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">WaitTime 5s → Reset conveyors</text>

  <line x1="340" y1="474" x2="340" y2="504" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- FWD + WaitTime 5.4 -->
  <rect x="185" y="504" width="310" height="56" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" x="340" y="524" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Set FWD_Conveyor</text>
  <text font-family="Arial" font-size="12" x="340" y="544" text-anchor="middle" dominant-baseline="central" fill="#444441">WaitTime 5.4s → Reset FWD</text>

  <line x1="340" y1="560" x2="340" y2="590" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Path_Home -->
  <rect x="225" y="590" width="230" height="44" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" x="340" y="612" text-anchor="middle" dominant-baseline="central" fill="#042C53">Path_Home</text>

  <line x1="340" y1="634" x2="340" y2="664" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- JULIAN -->
  <rect x="145" y="664" width="390" height="56" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" x="340" y="684" text-anchor="middle" dominant-baseline="central" fill="#042C53">Trazar letras: J, U, L, I, A, N</text>
  <text font-family="Arial" font-size="12" x="340" y="704" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Path_J_1/2, U_1/2/3, L_1/2, I, A_1/2/3, N_1/2/3</text>

  <line x1="340" y1="720" x2="340" y2="750" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- FELIPE -->
  <rect x="145" y="750" width="390" height="56" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" x="340" y="770" text-anchor="middle" dominant-baseline="central" fill="#042C53">Trazar letras: F, E, L, I, P, E</text>
  <text font-family="Arial" font-size="12" x="340" y="790" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Path_F_1/2/3, E_1/2/3/4, L_11/12, I_11, P_1/2/3/4, E_11/12/13/14</text>

  <line x1="340" y1="806" x2="340" y2="836" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decoracion -->
  <rect x="165" y="836" width="350" height="56" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" x="340" y="856" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Decoración</text>
  <text font-family="Arial" font-size="12" x="340" y="876" text-anchor="middle" dominant-baseline="central" fill="#712B13">Paths de elementos decorativos (C, O, B)</text>

  <line x1="340" y1="892" x2="340" y2="922" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Path_Home final -->
  <rect x="155" y="922" width="370" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" x="340" y="942" text-anchor="middle" dominant-baseline="central" fill="#04342C">Path_Home</text>
  <text font-family="Arial" font-size="12" x="340" y="962" text-anchor="middle" dominant-baseline="central" fill="#085041">Set FWD_Conveyor → WaitTime 4s → Reset → Reset DO_01</text>

  <line x1="340" y1="978" x2="340" y2="1008" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DI_02 -->
  <rect x="190" y="1008" width="300" height="44" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" x="340" y="1030" text-anchor="middle" dominant-baseline="central" fill="#412402">¿DI_02 = 1?</text>

  <line x1="580" y1="288" x2="580" y2="1030" stroke="#5F5E5A" stroke-width="1" fill="none"/>
  <line x1="580" y1="1030" x2="492" y2="1030" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="Arial" font-size="12" x="594" y="660" fill="#444441">NO (DI_01)</text>

  <line x1="340" y1="1052" x2="340" y2="1086" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text font-family="Arial" font-size="12" x="352" y="1074" fill="#444441">SÍ</text>

  <!-- DO_02 -->
  <rect x="175" y="1086" width="330" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" x="340" y="1106" text-anchor="middle" dominant-baseline="central" fill="#04342C">Set DO_02</text>
  <text font-family="Arial" font-size="12" x="340" y="1126" text-anchor="middle" dominant-baseline="central" fill="#085041">Path_Home_b → Reset DO_02</text>

  <line x1="490" y1="1030" x2="560" y2="1030" stroke="#5F5E5A" stroke-width="1" fill="none"/>
  <text font-family="Arial" font-size="12" x="520" y="1024" fill="#444441">NO</text>
  <line x1="560" y1="1030" x2="560" y2="1160" stroke="#5F5E5A" stroke-width="1" fill="none"/>
  <line x1="560" y1="1160" x2="420" y2="1160" stroke="#5F5E5A" stroke-width="1" fill="none" marker-end="url(#arrow)"/>

  <line x1="340" y1="1142" x2="340" y2="1180" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ENDWHILE -->
  <rect x="190" y="1180" width="300" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="Arial" font-size="14" font-weight="500" x="340" y="1202" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">ENDWHILE — volver al inicio</text>

  <!-- Loop back -->
  <line x1="190" y1="1202" x2="100" y2="1202" stroke="#5F5E5A" stroke-width="1" fill="none"/>
  <line x1="100" y1="1202" x2="100" y2="120" stroke="#5F5E5A" stroke-width="1" fill="none"/>
  <line x1="100" y1="120" x2="208" y2="120" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Leyenda -->
  <rect x="40" y="1270" width="14" height="14" rx="3" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="Arial" font-size="12" x="62" y="1281" dominant-baseline="central" fill="#444441">Bucle principal</text>
  <rect x="40" y="1294" width="14" height="14" rx="3" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="Arial" font-size="12" x="62" y="1305" dominant-baseline="central" fill="#444441">Control de actuadores</text>
  <rect x="40" y="1318" width="14" height="14" rx="3" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="Arial" font-size="12" x="62" y="1329" dominant-baseline="central" fill="#444441">Movimiento del robot (paths)</text>
  <rect x="40" y="1342" width="14" height="14" rx="3" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text font-family="Arial" font-size="12" x="62" y="1353" dominant-baseline="central" fill="#444441">Decoración</text>
  <rect x="40" y="1366" width="14" height="14" rx="3" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text font-family="Arial" font-size="12" x="62" y="1377" dominant-baseline="central" fill="#444441">Decisión (IF/condición)</text>
</svg>
